services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Port=5432;Database=invoice;Username=postgres;Password=1234
      - Jwt__Key=your-super-secret-key-make-it-long-at-least-32-chars
      - Jwt__Issuer=InvoiceBuilder
      - Jwt__Audience=InvoiceBuilder
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: invoice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"